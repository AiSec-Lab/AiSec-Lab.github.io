<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terminal Contact — AiSec Lab</title>
    <meta
      name="description"
      content="Terminal-style contact page for AiSec Lab with join information and the University of Dayton contact form."
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-xh6O/Ck1AhZ1tcHTfb3e8DqRL3OjaxAg/P6MqxsVXniPXTWh05rq6ArtyTcwxgW9"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/styles.css?v=20260402-slidesregen1" />
    <link rel="icon" type="image/x-icon" href="assets/images/logo/logo.ico" />
  </head>
  <body>
    <header class="site-header">
      <div class="container site-nav">
        <div class="brand">
          <div class="brand-mark">
            <img src="assets/images/logo/logo.svg" alt="AiSec Lab logo" />
          </div>
          <div class="brand-text">
            <div class="brand-title">AiSec Lab</div>
            <div class="brand-subtitle"></div>
          </div>
        </div>
        <button class="nav-toggle" aria-label="Toggle navigation">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <path d="M4 7h16M4 12h16M4 17h16" stroke="#0f1b2d" stroke-width="1.7" />
          </svg>
        </button>
        <nav class="nav-links" aria-label="Primary navigation">
          <a href="index.html">Home</a>
          <a href="news.html">News</a>
          <a href="papers.html">Publications</a>
          <a href="projects.html">Projects</a>
          <a href="people.html">People</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="page-hero">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-12 col-lg-10 page-hero-copy">
              <h1>Terminal Contact</h1>
              <p>A terminal-style contact view for demos, recordings, and a more technical lab vibe.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-12 col-lg-10">
              <div class="panel terminal-panel">
                <div class="terminal-titlebar">
                  <div class="terminal-controls" aria-hidden="true">
                    <button type="button" class="terminal-control is-disabled" title="Minimize disabled" disabled>—</button>
                    <button type="button" class="terminal-control is-disabled" title="Maximize disabled" disabled>▢</button>
                    <button type="button" class="terminal-control is-disabled" title="Close disabled" disabled>×</button>
                  </div>
                  <div class="terminal-title">terminal-contact.sh</div>
                </div>
                <div class="terminal-window terminal-static-window">
                  <div class="terminal-output" data-contact-terminal-output aria-live="polite"></div>
                </div>
              </div>

              <div class="contact-terminal-actions">
                <button class="button secondary" type="button" data-contact-replay>Replay Message</button>
                <a class="button secondary" href="contact.html">Open Standard Contact Page</a>
                <a
                  class="button"
                  href="https://udayton.edu/_resources/contact_form.php?cmsId=76ac207d0a480e99411d8665a6867a10"
                  target="_blank"
                  rel="noopener"
                >
                  Open Contact Form
                </a>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <div>© <span data-year></span> AiSec Lab.</div>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"

      crossorigin="anonymous"
    ></script>
    <script src="assets/script.js?v=20260402-slidesregen1"></script>
    <script src="assets/contact-terminal.js?v=20260402-slidesregen1"></script>
  </body>
</html>
